<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGPA Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>📊 CGPA Calculator <small>semester + cumulative</small></h1>

    <div class="subhead">
      <div class="mode-toggle">
        <button id="modeStandard" class="active">📘 Standard</button>
        <button id="modeWhatIf">🔮 What‑if</button>
      </div>
      <span id="modeLabel">Current: Standard</span>
    </div>

    <!-- semester form -->
    <div class="form-row">
      <div class="input-group">
        <label>Subject</label>
        <input type="text" id="subjectName" placeholder="e.g. Data Structures" />
      </div>
      <div class="input-group">
        <label>Credits</label>
        <input type="number" id="subjectCredits" min="0.5" step="0.5" value="3" />
      </div>
      <div class="input-group">
        <label>Grade (out of 10)</label>
        <select id="subjectGrade">
          <option value="10">A+ (10)</option>
          <option value="9">A (9)</option>
          <option value="8" selected>B+ (8)</option>
          <option value="7">B (7)</option>
          <option value="6">C+ (6)</option>
          <option value="5">C (5)</option>
          <option value="4">D (4)</option>
          <option value="0">F (0)</option>
        </select>
      </div>
      <button id="addSubjectBtn" class="btn-add">➕ Add</button>
    </div>

    <!-- subject list -->
    <div id="subjectList" class="subject-list">
      <p>No subjects added yet.</p>
    </div>

    <!-- GPA summary -->
    <div class="summary-grid">
      <div class="stat-card"><span>📘 Semester GPA</span><strong id="semesterGpa">—</strong></div>
      <div class="stat-card"><span>📈 Cumulative CGPA</span><strong id="cumulativeGpa">—</strong></div>
      <div class="stat-card" id="whatIfCard"><span>🔮 What‑if CGPA</span><strong id="whatIfGpa">—</strong></div>
    </div>

    <!-- what-if controls (hidden by default) -->
<div id="whatIfControls" style="display: none; margin-top: 1.5rem; border-top: 1px dashed #b2cfdd; padding-top: 1.2rem;">
  <div style="display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: flex-end;">
    <div class="input-group" style="flex:2 1 180px;">
      <label>Future semester GPA (out of 10)</label>
      <input type="number" id="futureGpaInput" step="0.01" min="0" max="10" value="8.5" />
    </div>
    <div class="input-group" style="flex:1 1 120px;">
      <label>Future credits</label>
      <input type="number" id="futureCreditsInput" step="0.5" min="0" value="15" />
    </div>
    <button id="simulateBtn" class="btn-simulate">✨ Simulate</button>
    <button id="resetWhatIfBtn" class="btn-reset">↺ Reset</button>
  </div>
  <p style="font-size:0.85rem; color:#1d4b62; margin-top:0.5rem;">
    Enter expected average GPA &amp; credits for next semester(s) to see projected CGPA.
  </p>
</div>

    <div style="display: flex; justify-content: flex-end; margin-top: 1.8rem;">
      <button id="resetAllBtn" class="btn-reset-all">🗑️ Reset all subjects</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
